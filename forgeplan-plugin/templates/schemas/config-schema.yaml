# ForgePlan Configuration — .forgeplan/config.yaml
# BYOK (Bring Your Own Key) and review preferences.
# This file is optional. Without it, all reviews use the native Claude reviewer.

# --- Review Configuration ---
review:
  # Mode: how cross-model review is executed
  # "native" — use Claude Code's built-in reviewer (default, no config needed)
  # "mcp" — use MCP server for alternate model (recommended for Codex — no API key needed)
  # "cli" — spawn alternate model's CLI as subprocess (works with any CLI tool)
  # "api" — direct HTTP API calls (requires api_key)
  mode: "native"

  # --- MCP Mode Settings ---
  # Requires: `claude mcp add [server-name]` configured beforehand
  # mcp_server: "codex"          # MCP server name (as configured in claude mcp)

  # --- CLI Mode Settings ---
  # cli_command: "codex"          # CLI executable name
  # cli_args: []                  # Additional CLI arguments

  # --- API Mode Settings ---
  # provider: "openai"            # openai | google | anthropic
  # api_key: "$OPENAI_API_KEY"    # Env var reference (prefix with $) or direct key
  # model: "gpt-4o"               # Model to use for review

  # --- Common Settings ---
  # timeout: 120000               # Timeout in ms for cross-model calls (default: 2 minutes)

# --- Multi-Agent Review (same model, fresh agents) ---
# For users without cross-model API keys who still want independent review agents.
# Each cycle spawns a FRESH Claude subagent (no shared context with the builder)
# to review the code. Better than self-review because of same-context blindness.
multi_agent_review:
  enabled: false                   # Set to true to enable iterative agent review cycles
  max_cycles: 3                    # Max review→fix cycles before escalating to user
  reviewer_model: "opus"           # Model for independent review agents (opus recommended)
  fixer_model: "auto"              # "auto" (default) = agent picks model per fix complexity:
                                   #   - Simple fixes (typos, missing imports, formatting): haiku
                                   #   - Directed fixes (implement missing AC, add validation): sonnet
                                   #   - Complex fixes (architectural, multi-file, logic rewrites): opus
                                   # Or set to a specific model: "sonnet", "opus", "haiku"
  # When combined with cross-model review (review.mode != "native"), this runs FIRST,
  # then cross-model review runs after all same-model cycles converge.

# --- Enforcement Mode ---
enforcement:
  # "strict" — cross-model review must pass before node can advance to "reviewed"
  #            (blocks the review→reviewed transition until cross-model agrees)
  # "advisory" — cross-model review runs but results are informational only
  #              (node advances to "reviewed" regardless of cross-model findings)
  mode: "advisory"

# --- Model Configuration ---
# Assign different models to different roles for cost optimization.
# Uses Claude model names: "opus", "sonnet", "haiku"
# Default is "sonnet" for most tasks — override specific roles as needed.
models:
  # Architecture & discovery — needs strong reasoning
  architect: "opus"

  # Building — depends on node complexity
  builder: "sonnet"              # Default for all builds
  # builder_override:            # Optional per-node overrides
  #   database: "sonnet"         # Simple schema work
  #   auth: "opus"               # Complex auth flows
  #   api: "opus"                # Integration-heavy

  # Review — needs critical analysis
  reviewer: "sonnet"             # Per-node spec-diff review
  reviewer_final: "opus"         # Final review before ship (Sprint 5)

  # Spec generation
  spec: "sonnet"                 # Most specs are straightforward

  # Sprint 6 sweep agents
  # sweep_type_check: "sonnet"   # Mechanical pattern matching
  # sweep_security: "opus"       # Reasoning-heavy security audit
  # sweep_api: "sonnet"          # Contract verification
  # sweep_imports: "haiku"       # Simple import chain analysis
