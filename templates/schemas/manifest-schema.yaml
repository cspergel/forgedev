# ForgePlan Manifest Schema
# This is the template used by /forgeplan:discover to generate manifest.yaml
# The manifest is the central command file — the spider at the center of the web.
# Every operation in ForgePlan begins by reading the manifest.

# --- Project Metadata ---
project:
  name: ""                          # Human-readable project name
  description: ""                   # One-line project description
  complexity_tier: ""               # SMALL | MEDIUM | LARGE — set by Architect during discovery
                                    # Drives: node granularity, sweep agent count, verification depth,
                                    # cross-model requirements, walkthrough depth.
                                    # Can be overridden via config.yaml tier_override.
  tech_stack:                       # Technology choices (informs builder and verify-runnable)
    runtime: ""                     # e.g., "node", "deno", "bun"
    language: ""                    # e.g., "typescript", "javascript"
    database: ""                    # e.g., "supabase", "postgresql", "sqlite", "mongodb", "none"
    orm: ""                         # e.g., "supabase-js", "drizzle", "prisma", "knex", "none"
    api_framework: ""               # e.g., "express", "fastify", "hono", "none"
    auth: ""                        # e.g., "supabase-auth", "clerk", "lucia", "custom", "none"
    test_framework: ""              # e.g., "vitest", "jest", "mocha", "node:test"
    test_command: ""                # Custom test command if not standard (e.g., "npm run test:ci")
    frontend: ""                    # e.g., "react", "vue", "svelte", "nextjs", "none"
    deployment: ""                  # e.g., "docker", "vercel", "railway", "fly", "undecided"
    dev_port: null                  # Default dev server port (e.g., 3000, 5173). null = auto-detect.
    mock_mode: false                # If true, builder adds MOCK_MODE support for external services
    infrastructure: ""              # Optional: external service dependencies (e.g., "docker", "redis", "none")
  created_at: ""                    # ISO 8601 timestamp
  revision_count: 0                 # Incremented on every manifest write

# --- Shared Models ---
# Canonical data types used across multiple nodes.
# Any entity referenced by 2+ nodes MUST be defined here, never locally in specs.
# Agents import these definitions — they do not redefine them.
shared_models:
  # Example:
  # User:
  #   fields:
  #     id: "string (UUID)"
  #     email: "string"
  #     role: "string (enum: client, accountant)"
  #     name: "string"
  #     created_at: "string (ISO 8601)"

# --- Validation Rules ---
# Enforced by validate-manifest script after every manifest write.
validation:
  no_circular_dependencies: true    # Topological sort must succeed
  no_orphan_nodes: true             # Every node must connect to at least one other
  no_file_scope_overlaps: true      # No two nodes can claim the same directory

# --- Nodes ---
# Each entry defines a node in the architecture graph.
# Detailed specs live in .forgeplan/specs/[node-id].yaml
nodes:
  # Example:
  # auth:
  #   name: "Authentication Service"
  #   type: "service"               # service | frontend | database | storage | integration | cli | library | extension | worker | pipeline
  #   status: "pending"             # pending | specced | building | built | reviewing | review-fixing | reviewed | revising | revised | sweeping
  #   file_scope: "src/auth/**"
  #   depends_on:
  #     - database
  #   connects_to:
  #     - database
  #     - api
  #     - frontend-login
  #   files: []                     # Auto-populated by PostToolUse hook during build
  #   spec: "specs/auth.yaml"       # Pointer to detailed spec file
